                  </div>
                  <div className="flex flex-col">
                    <span className="text-white/40 font-bold uppercase tracking-widest text-sm flex items-center gap-2">🛡️ Domingos</span>
                    <span className="text-white/50 font-bebas text-2xl line-through">CERRADO</span>
                  </div>
                  <div className="flex flex-col">
                    <span className="text-brand-red font-bold uppercase tracking-widest text-sm flex items-center gap-2">⚔️ Feriados</span>
                    <span className="text-white font-bebas text-3xl">08:00 a 14:00</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Modal Galería (Pública) */}
          {showModal === 'galeria' && (
            <div className="fixed inset-0 bg-black/95 z-[60] flex flex-col p-4 md:p-12 overflow-y-auto fade-in">
              <button onClick={() => setShowModal(null)} className="absolute top-4 right-4 md:top-12 md:right-12 text-white hover:text-brand-red flex items-center gap-2 font-bold uppercase tracking-widest">
                 Cerrar <IconClose />
              </button>
              
              <div className="max-w-6xl w-full mx-auto mt-10">
                <h2 className="font-bebas text-5xl text-white mb-2 tracking-widest uppercase text-center"><span className="text-brand-red">Muro de Leyendas</span><br/>(Antes y Después)</h2>
                <p className="text-white/50 text-center mb-12 font-inter max-w-xl mx-auto">Nuestros guerreros comparten su progreso al mundo. Para subir el tuyo, ingresa a tu panel de socio.</p>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                  {publicGallery.map(item => (
                    <div key={item.id} className="relative group cursor-pointer">
                      <div className="aspect-[4/5] bg-zinc-900 rounded-xl overflow-hidden border border-white/10 group-hover:border-brand-red transition flex justify-between">
                         <div className="w-1/2 bg-black/80 flex items-center justify-center text-white/30 font-bebas text-2xl border-r border-white/5">ANTES</div>
                         <div className="w-1/2 bg-neutral-800 flex items-center justify-center text-brand-red/50 font-bebas text-2xl">DESPUÉS</div>
                      </div>
                      <div className="mt-4 text-center">
                        <h4 className="font-bold text-white uppercase tracking-wider">{item.name}</h4>
                        <p className="text-sm text-brand-red font-medium uppercase tracking-widest">{item.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ----- 2. FORMULARIO PROTOCOLO ONBOARDING -----
    const FormularioPrimerIngreso = ({ onDone }) => {
      const [formData, setFormData] = useState({ peso: '', altura: '', objetivo: '', constancia: '' });

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative z-10 fade-in">
          <div className="glass-card w-full max-w-2xl rounded-2xl p-8 md:p-12 border-t-4 border-t-brand-red">
            <h2 className="font-bebas text-5xl text-white mb-2 tracking-wide uppercase text-center">Datos Físicos</h2>
            <p className="text-white/60 mb-8 text-center text-sm font-inter">Este formulario matemático calibrará tu dieta y rutinas. Sé sincero.</p>
            
            <form onSubmit={(e) => { e.preventDefault(); onDone(formData); }} className="space-y-6">
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="text-xs uppercase text-brand-red font-bold tracking-widest mb-2 block">Peso Físico</label>
                  <input required type="text" inputMode="decimal" placeholder="Ej: 80.5 (kg)" className="w-full glass-input rounded-lg p-4 font-bold text-lg" />
                </div>
                <div>
                  <label className="text-xs uppercase text-brand-red font-bold tracking-widest mb-2 block">Altura Estatura</label>
                  <input required type="text" inputMode="decimal" placeholder="Ej: 1,82 (mts)" className="w-full glass-input rounded-lg p-4 font-bold text-lg" />
                </div>
              </div>

              <div>
                <label className="text-xs uppercase text-brand-red font-bold tracking-widest mb-2 block">Objetivo Actual Físico</label>
                <select required className="w-full glass-input rounded-lg p-4 font-bold text-lg [&>option]:bg-brand-dark" onChange={e => setFormData({...formData, objetivo: e.target.value})}>
                  <option value="">-- Selecciona el Plan de Guerra --</option>
                  <option value="volumen">Volumen Limpio (Superávit/Ganancia)</option>
                  <option value="deficit">Déficit Calórico (Cortar Grasa/Bajar Peso)</option>
                  <option value="estetico">Estético (Mantenimiento y Tonificación)</option>
                </select>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="text-xs uppercase text-brand-red font-bold tracking-widest mb-2 block">Dieta de</label>
                  <input type="text" disabled value={formData.objetivo === 'volumen' ? '~3000 Kcal' : formData.objetivo === 'deficit' ? '~2000 Kcal' : formData.objetivo === 'estetico' ? '~2500 Kcal' : 'Automático'} className="w-full bg-black/50 border border-white/5 rounded-lg p-4 text-white/50 font-bold opacity-70" />
                </div>
                <div>
                  <label className="text-xs uppercase text-brand-red font-bold tracking-widest mb-2 block">Días Entrenables</label>
                  <select required className="w-full glass-input rounded-lg p-4 font-bold text-lg [&>option]:bg-brand-dark">
                    <option value="">Frecuencia Semanal</option>
                    <option value="3">3 Días</option>
                    <option value="4">4 Días</option>
                    <option value="5">5 Días</option>
                  </select>
                </div>
              </div>

              <button type="submit" className="w-full btn-red py-4 rounded-lg text-2xl font-bebas tracking-widest mt-6">FORJAR MI CÓDIGO</button>
            </form>
          </div>
        </div>
      )
    };

    // ----- 3. DASHBOARDS CLIENTE -----
    const DashboardClient = ({ view, setView }) => {
      const renderInicio = () => (
        <div className="space-y-8 fade-in">
          <div className="glass-card p-6 md:p-10 rounded-2xl">
            <h2 className="font-bebas text-5xl text-white tracking-widest mb-1 uppercase">Tu Imperio Personal</h2>
            <p className="text-white/70">Todo calibrado según tu último protocolo.</p>
            
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
              <div className="border border-white/5 p-4 rounded-xl bg-black/40 text-center md:text-left">
                <p className="text-xs text-white/50 uppercase font-bold tracking-widest mb-1">Cuota</p>
                <p className="text-2xl font-bold text-emerald-500">AL DÍA</p>
              </div>
               <div className="border border-brand-red/20 border-t-2 border-t-brand-red p-4 rounded-xl bg-brand-red/5 text-center md:text-left">
                <p className="text-xs text-brand-red uppercase font-bold tracking-widest mb-1">Tu Objetivo</p>
                <p className="text-xl font-bold text-white leading-tight">Déficit Calórico</p>
              </div>
            </div>
            
            <div className="mt-8 border border-white/10 bg-black/40 p-6 rounded-xl flex flex-col md:flex-row justify-between md:items-center">
              <div>
                <h3 className="font-bebas text-3xl tracking-widest text-brand-red">DÍA 1: CORTANDO GRASA</h3>
                <p className="text-white/80">Entrenamiento intenso (AltaFC) con pesas.</p>
              </div>
               <button onClick={() => setView('rutina')} className="mt-4 md:mt-0 btn-red px-8 py-3 rounded font-bebas text-2xl tracking-widest">IR A RUTINA</button>
            </div>
          </div>
        </div>
      );

      const renderRutina = () => (
        <div className="fade-in max-w-5xl mx-auto pb-20">
          <div className="bg-brand-red/10 border border-brand-red/20 rounded-xl p-6 mb-8 text-center md:text-left">
             <h2 className="font-bebas text-4xl text-white tracking-widest">ESTO TE TOCA HOY. NO HAY EXCUSAS.</h2>
             <p className="text-brand-red font-bold text-sm uppercase tracking-widest mt-1">6 Ejercicios • Descansos de 60s sugeridos</p>
          </div>

          {[
            { id: 1, name: 'Press Inclinado Severo', sets: 4, reps: '12-15' },
            { id: 2, name: 'Sentadilla Libre', sets: 4, reps: '10-12' },
          ].map((ex) => (
            <div key={ex.id} className="glass-card mb-4 p-5 rounded-xl flex flex-col md:flex-row justify-between md:items-center gap-4">
               <div>
                  <h3 className="font-bebas text-2xl text-white tracking-widest flex items-center gap-3">{ex.id}. {ex.name}
                    <button className="text-white opacity-50 hover:text-brand-red hover:opacity-100 transition"><IconPlay /></button>
                  </h3>
                  <div className="flex gap-4 mt-2">
                    <span className="text-brand-red text-sm font-bold tracking-widest uppercase">{ex.sets} Series / {ex.reps} Reps</span>
                  </div>
               </div>
               <button onClick={() => alert("¡Descanso de 60s iniciado (Simulado)!")} className="border border-white/20 hover:border-brand-red text-white hover:text-brand-red text-xs font-bold uppercase tracking-widest px-4 py-2 rounded transition">
                 Iniciar Descanso
               </button>
            </div>
          ))}
        </div>
      );

      const renderDieta = () => (
        <div className="fade-in max-w-5xl mx-auto pb-20">
          <header className="mb-10 text-center">
            <h2 className="font-bebas text-6xl text-white tracking-widest uppercase">Plan Dietético Auto-Generado</h2>
            <p className="text-brand-red font-bold mt-2 tracking-widest uppercase rounded-full bg-brand-red/10 inline-block px-4 py-1">Enfoque: Déficit Calórico (-300 Kcal)</p>
          </header>
          
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div className="relative glass-card border flex flex-col p-6 rounded-xl overflow-hidden border-white/10 hover:border-brand-red/50 transition">
              <button className="absolute top-4 right-4 bg-black/60 p-2 rounded text-white/50 hover:text-brand-red transition"><IconRefresh /></button>
              <h3 className="font-bebas text-3xl text-brand-red tracking-wide mb-3">Comida 1</h3>
              <p className="text-white/90 font-medium">3 Huevos (2 claras) + 1 Tostada Integral</p>
            </div>
            <div className="relative glass-card border flex flex-col p-6 rounded-xl overflow-hidden border-white/10 hover:border-brand-red/50 transition">
              <button className="absolute top-4 right-4 bg-black/60 p-2 rounded text-white/50 hover:text-brand-red transition"><IconRefresh /></button>
              <h3 className="font-bebas text-3xl text-brand-red tracking-wide mb-3">Comida 2</h3>
              <p className="text-white/90 font-medium">200g Pollo Magro + Ensalada Verde (Sin carbos)</p>
            </div>
          </div>
        </div>
      );

      const renderProgreso = () => (
        <div className="fade-in max-w-4xl mx-auto pb-20">
          <header className="mb-8 p-8 glass-card border-brand-red/30 rounded-2xl border-t-2 border-t-brand-red text-center md:text-left">
            <h2 className="font-bebas text-5xl text-white tracking-widest uppercase">Tu Evolución</h2>
            <p className="text-white/70">Comparte tu progreso con la comunidad, o mántenlo oculto solo para los ojos del Staff de Olympia.</p>
          </header>
          
          {/* Zona de Subida */}
          <div className="border border-white/20 bg-black/50 p-8 rounded-xl flex flex-col items-center justify-center">
            <div className="w-16 h-16 rounded-full bg-brand-red/20 text-brand-red flex items-center justify-center mb-4 border border-brand-red/50">
               <IconCamera />
            </div>
            <h3 className="font-bold uppercase tracking-widest text-white text-center">Subir Nuevo "Antes / Después"</h3>
            <p className="text-brand-red/70 text-sm mt-2 text-center">Inspirate e inspira a otros (JPG/PNG)</p>
            
            <div className="w-full max-w-sm mt-6">
              <label className="flex items-center justify-between p-4 border border-white/20 rounded-lg cursor-pointer hover:border-white/50 transition">
                <span className="text-sm font-bold text-white uppercase tracking-wider">Publicar en el Muro Público</span>
                <input type="checkbox" className="w-5 h-5 accent-brand-red" defaultChecked />
              </label>
              <p className="text-xs text-white/30 text-center mt-3">*Si lo desmarcas, solo el Admin validará tus fotos.*</p>
            </div>
            <button className="mt-8 btn-red px-10 py-3 rounded uppercase font-bold tracking-widest">Seleccionar Fotos</button>
          </div>
        </div>
      );

      if (view === 'rutina') return renderRutina();
      if (view === 'dieta') return renderDieta();
      if (view === 'progreso') return renderProgreso();
      return renderInicio();
    };

    // ----- MENU STAFF (Reducido por demo) -----
    const DashboardAdmin = () => (
       <div className="fade-in text-center p-20 glass-card mx-auto max-w-2xl rounded-2xl border-brand-red">
          <h2 className="font-bebas text-5xl text-white mb-4">PANEL STAFF</h2>
          <p className="text-white/50">Igual que antes. (Versión abreviada en esta demostración priorizando flujos del cliente).</p>
          <button className="mt-8 btn-red px-8 py-3 rounded font-bold tracking-widest border border-brand-red">APERTURA MANUAL DE PUERTA</button>
       </div>
    );

    // ----- MAIN LAYOUT CLIENTE/ADMIN -----
    const MainLayout = ({ role, onLogout }) => {
      const [view, setView] = useState('inicio'); 
      const [formDone, setFormDone] = useState(false);

      if(role === 'client' && !formDone) return <FormularioPrimerIngreso onDone={(data) => { console.log(data); setFormDone(true); }} />;

      return (
        <div className="relative z-10 flex flex-col min-h-screen">
          <nav className="glass-card sticky top-0 w-full z-50 flex justify-between items-center px-4 md:px-8 py-4 border-b-0 shadow-2xl">
             <div className="text-brand-red font-bebas text-4xl tracking-widest leading-none cursor-pointer">
                OLYMPIA<span className="text-xs text-white/70 ml-2 tracking-widest font-inter hidden lg:inline-block">SANTUARIO ESPARTANO</span>
             </div>
             
             {role === 'client' && (
                <div className="hidden md:flex gap-8 uppercase font-bold text-sm tracking-widest">
                  <button onClick={()=>setView('inicio')} className={`transition ${view==='inicio'?'text-brand-red border-b border-brand-red':'text-white hover:text-brand-red'}`}>Inicio</button>
                  <button onClick={()=>setView('dieta')} className={`transition ${view==='dieta'?'text-brand-red border-b border-brand-red':'text-white hover:text-brand-red'}`}>Dieta</button>
                  <button onClick={()=>setView('rutina')} className={`transition ${view==='rutina'?'text-brand-red border-b border-brand-red':'text-white hover:text-brand-red'}`}>Rutina</button>
                  <button onClick={()=>setView('progreso')} className={`transition ${view==='progreso'?'text-brand-red border-b border-brand-red':'text-white hover:text-brand-red'}`}>Galería Evolución</button>
                </div>
             )}

             <button onClick={onLogout} className="text-brand-red hover:text-white uppercase tracking-widest text-xs font-bold border border-brand-red/30 bg-brand-red/10 hover:bg-brand-red/30 px-6 py-2 rounded transition">
               Finalizar Sesión
             </button>
          </nav>

          <main className="flex-1 p-4 md:p-8 overflow-y-auto">
             {role === 'client' && <DashboardClient view={view} setView={setView} />}
             {role === 'admin' && <DashboardAdmin />}
          </main>

          {/* Menú Mobile App Inferior */}
          {role === 'client' && (
             <div className="md:hidden sticky bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around p-3 z-50 backdrop-blur pb-8">
               <button onClick={()=>setView('inicio')} className={`flex flex-col items-center gap-1 uppercase tracking-widest font-bold text-[10px] ${view==='inicio'?'text-brand-red':'text-white/40'}`}><IconHome />Inicio</button>
               <button onClick={()=>setView('dieta')} className={`flex flex-col items-center gap-1 uppercase tracking-widest font-bold text-[10px] ${view==='dieta'?'text-brand-red':'text-white/40'}`}><IconUtensils />Dieta</button>
               <button onClick={()=>setView('rutina')} className={`flex flex-col items-center gap-1 uppercase tracking-widest font-bold text-[10px] ${view==='rutina'?'text-brand-red':'text-white/40'}`}><IconActivity />Rutina</button>
               <button onClick={()=>setView('progreso')} className={`flex flex-col items-center gap-1 uppercase tracking-widest font-bold text-[10px] ${view==='progreso'?'text-brand-red':'text-white/40'}`}><IconCamera />Galeria</button>
             </div>
          )}
        </div>
      );
    }

    function App() {
      const [role, setRole] = useState(null);
      if (!role) return <LandingAccess onLogin={setRole} />;
      return <MainLayout role={role} onLogout={() => setRole(null)} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
